
# 개발환경용 Docker Compose
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: stk-redis
    ports:
      - "6379:6379"
    networks:
      - stk-network
    restart: unless-stopped

  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:16
    container_name: stk-postgres
    environment:
      POSTGRES_DB: stk_db
      POSTGRES_USER: stk_user
      POSTGRES_PASSWORD: stk_password
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stk-network
    restart: unless-stopped