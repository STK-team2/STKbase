spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS JSON
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail:
        debug: false
  test:
    database:
      replace: none
  security:
    jwt:
      secret: test-jwt-secret-for-repository-tests

logging:
  level:
    org.springframework.mail: WARN
    team2.stk: WARN
